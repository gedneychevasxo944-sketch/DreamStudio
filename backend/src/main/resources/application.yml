server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: dream-studio-backend

  # H2 Database (开发环境)
  datasource:
    url: jdbc:h2:mem:aimanjudb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

# 日志配置
logging:
  level:
    com.aimanju: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# CORS配置
cors:
  allowed-origins: "*"
  allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
  allowed-headers: "*"

# 上游服务配置
upstream:
  client: simulation  # simulation | production
  ai:
    base-url: http://localhost:8081
